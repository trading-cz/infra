name: 'Kafka: Browse Topics'

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment (dev/prod)'
        required: true
        type: choice
        options:
          - dev
          - prod
        default: 'dev'
      topic:
        description: 'Topic name (empty = all topics)'
        required: false
        default: ''
        type: string
      offset:
        description: 'Read from earliest or latest'
        required: false
        default: 'latest'
        type: choice
        options:
          - latest
          - earliest
      max_messages:
        description: 'Max messages to read per topic'
        required: false
        default: '10'
        type: string

jobs:
  browse-topics:
    name: Browse Kafka Topics
    runs-on: ubuntu-latest
    steps:
      - name: Install hcloud CLI
        run: |
          curl -fsSL https://github.com/hetznercloud/cli/releases/download/v1.47.0/hcloud-linux-amd64.tar.gz | tar -xz
          chmod +x hcloud
          sudo mv hcloud /usr/local/bin/

      - name: Get Kafka-0 External IP from Hetzner Cloud
        id: kafka_ip
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          ENV="${{ inputs.environment }}"
          CLUSTER="k3s-trading"
          KAFKA_NAME="${ENV}-${CLUSTER}-kafka-0"

          echo "🔍 Looking for server: $KAFKA_NAME"

          KAFKA_IP=$(hcloud server list -o noheader -o columns=name,ipv4 | grep "^$KAFKA_NAME " | awk '{print $2}' | head -1)

          if [ -z "$KAFKA_IP" ]; then
            echo "❌ Could not find kafka server '$KAFKA_NAME' in Hetzner Cloud"
            echo ""
            echo "Available servers:"
            hcloud server list -o columns=name,ipv4,status
            exit 1
          fi

          echo "ip=$KAFKA_IP" >> $GITHUB_OUTPUT
          echo "✅ Found kafka-0 IP: $KAFKA_IP"

      - name: Install kcat (kafkacat)
        run: |
          sudo apt-get update
          sudo apt-get install -y kafkacat

      - name: Browse Topics
        run: |
          BROKER="${{ steps.kafka_ip.outputs.ip }}:30002"
          TOPIC="${{ inputs.topic }}"
          OFFSET="${{ inputs.offset }}"
          MAX_MESSAGES="${{ inputs.max_messages }}"

          echo "========================================"
          echo "  Kafka Topic Browser"
          echo "  Broker: $BROKER"
          echo "  Offset: $OFFSET"
          echo "========================================"

          # Build topic list: either the single provided topic or discover all
          if [ -n "$TOPIC" ]; then
            TOPICS="$TOPIC"
            echo "📌 Using provided topic: $TOPIC"
          else
            echo "🔍 Discovering all topics..."
            TOPICS=$(kcat -L -b "$BROKER" 2>/dev/null | grep '^\s*topic ' | awk '{print $2}' | tr -d '"' | sort)
            if [ -z "$TOPICS" ]; then
              echo "❌ No topics found or cannot connect to broker"
              exit 1
            fi
            echo "Found topics:"
            echo "$TOPICS" | while read -r t; do echo "  - $t"; done
          fi

          echo ""

          # Iterate over each topic
          echo "$TOPICS" | while read -r CURRENT_TOPIC; do
            [ -z "$CURRENT_TOPIC" ] && continue

            echo "========================================"
            echo "📋 Topic: $CURRENT_TOPIC"
            echo "========================================"

            # Show topic metadata & offsets
            echo "--- Partitions & Offsets ---"
            kcat -L -b "$BROKER" -t "$CURRENT_TOPIC" 2>/dev/null | grep -E 'partition|topic' || true

            echo ""
            echo "--- Watermark Offsets (low..high per partition) ---"
            kcat -Q -b "$BROKER" -t "$CURRENT_TOPIC" 2>/dev/null || echo "  (unable to query offsets)"

            echo ""
            echo "--- Messages (${OFFSET}, max ${MAX_MESSAGES}) ---"

            # Read messages with key, value, timestamp
            # -o = offset (-1 = latest, -2 = earliest)
            if [ "$OFFSET" = "earliest" ]; then
              OFFSET_FLAG="-o beginning"
            else
              OFFSET_FLAG="-o end"
            fi

            # -f format: Timestamp \t Partition \t Offset \t Key \t Value
            kcat -C -b "$BROKER" -t "$CURRENT_TOPIC" \
              $OFFSET_FLAG \
              -c "$MAX_MESSAGES" \
              -e \
              -f 'Timestamp: %T  Partition: %p  Offset: %o\nKey:   %k\nValue: %s\n---\n' \
              2>/dev/null || echo "  (no messages or unable to consume)"

            echo ""
          done

          echo "========================================"
          echo "✅ Done"
          echo "========================================"
